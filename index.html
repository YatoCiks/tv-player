<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TV Video Player</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}
</style>

</head>

<body>

<video id="player" autoplay muted playsinline></video>

<script>

let videos = [];
let i = 0;

const player = document.getElementById("player");

/* Carrega lista automaticamente do JSON */
fetch("videos.json")
.then(response => response.json())
.then(data => {
    videos = data.videos;
    playNext();
})
.catch(err => {
    console.error("Erro ao carregar videos.json:", err);
});

/* Função de reprodução sequencial */
function playNext() {

  if (!videos.length) return;

  player.src = videos[i];
  player.load();
  player.play();

  i++;

  if (i >= videos.length) {
    i = 0;
  }
}

/* Quando o vídeo termina, vai para o próximo */
player.onended = playNext;

</script>

</body>
</html>
