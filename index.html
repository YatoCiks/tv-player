<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TV Player</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}
</style>

</head>

<body>

<video id="player" playsinline preload="auto"></video>

<script>

let videos = [];
let i = 0;

const player = document.getElementById("player");

/* =========================
   FULLSCREEN
========================= */
function requestFullscreen() {
    const el = document.documentElement;

    try {
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } catch (e) {}
}

/* =========================
   ÁUDIO (liberação por interação)
========================= */
function enableAudio() {
    player.muted = false;
}

/* =========================
   PLAYBACK
========================= */
function playVideo() {

    if (!videos.length) return;

    player.src = videos[i];
    player.load();

    attemptPlay();
}

/* Autoplay com múltiplas tentativas */
function attemptPlay() {
    const p = player.play();

    if (p !== undefined) {
        p.catch(() => {
            // tenta novamente após pequena espera
            setTimeout(() => {
                player.play().catch(() => {});
            }, 500);
        });
    }
}

/* =========================
   CARREGAMENTO DA PLAYLIST
========================= */
fetch("videos.json")
.then(r => r.json())
.then(data => {
    videos = data.videos;
    playVideo();
})
.catch(err => console.error("Erro JSON:", err));

/* =========================
   TROCA DE VÍDEO (robusto para TV)
========================= */
player.addEventListener("timeupdate", () => {

    if (!player.duration) return;

    if (player.currentTime >= player.duration - 0.25) {

        i++;

        if (i >= videos.length) {
            i = 0;
        }

        playVideo();
    }
});

/* =========================
   MODO KIOSK (interação do usuário)
========================= */
function activateKioskMode() {
    requestFullscreen();
    enableAudio();
    player.play().catch(() => {});
}

/* Interação do controle remoto / clique */
document.addEventListener("keydown", activateKioskMode);
document.addEventListener("click", activateKioskMode);

/* =========================
   AUTOPLAY INICIAL (tentativas)
========================= */
window.addEventListener("load", () => {

    requestFullscreen();

    // primeira tentativa
    setTimeout(() => {
        player.play().catch(() => {});

        // segunda tentativa (fallback)
        setTimeout(() => {
            player.play().catch(() => {});
        }, 1000);

    }, 500);
});

/* =========================
   FALLBACK: se travar, reinicia fluxo
========================= */
setInterval(() => {
    if (player.readyState === 0) {
        playVideo();
    }
}, 5000);

</script>

</body>
</html>
