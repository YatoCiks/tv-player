<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TV Video Player</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}
</style>

</head>

<body>

<video id="player" autoplay muted playsinline></video>

<script>

let videos = [];
let i = 0;

const player = document.getElementById("player");

/* Carrega lista de vídeos */
fetch("videos.json")
.then(r => r.json())
.then(data => {
    videos = data.videos;
    playVideo();
})
.catch(err => {
    console.error("Erro ao carregar videos.json:", err);
});

/* Reproduz vídeo atual */
function playVideo() {
    if (!videos.length) return;

    player.src = videos[i];
    player.load();

    const playPromise = player.play();
    if (playPromise !== undefined) {
        playPromise.catch(err => {
            console.log("Autoplay bloqueado ou erro:", err);
        });
    }
}

/* Avança corretamente ao fim do vídeo */
player.addEventListener("ended", () => {
    i++;

    if (i >= videos.length) {
        i = 0;
    }

    playVideo();
});

/* Libera áudio após qualquer interação (controle remoto/clique/toque) */
document.addEventListener("click", () => {
    player.muted = false;
    player.play();
});

document.addEventListener("keydown", () => {
    player.muted = false;
    player.play();
});

</script>

</body>
</html>
