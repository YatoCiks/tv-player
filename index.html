<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TV Video Player</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
}
</style>

</head>

<body>

<video id="player" autoplay playsinline></video>

<script>

let videos = [];
let i = 0;

const player = document.getElementById("player");

/* Carrega playlist */
fetch("videos.json")
.then(r => r.json())
.then(data => {
    videos = data.videos;
    playVideo();
})
.catch(err => {
    console.error("Erro ao carregar videos.json:", err);
});

/* Reproduz vídeo atual */
function playVideo() {

    if (!videos.length) return;

    player.src = videos[i];
    player.load();

    player.play().catch(err => {
        console.log("Erro autoplay:", err);
    });
}

/* Troca mais confiável que ended (TV-safe) */
player.addEventListener("timeupdate", () => {

    if (!player.duration) return;

    if (player.currentTime >= player.duration - 0.25) {

        i++;

        if (i >= videos.length) {
            i = 0;
        }

        playVideo();
    }
});

</script>

</body>
</html>
