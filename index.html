<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body {
  margin: 0;
  background: black;
}

video,
img,
iframe {

  width: 100vw;
  height: 100vh;
  object-fit: contain;
  border: none;
}

video,
img,
iframe {
  display: none;
}

</style>

</head>

<body>

<video id="videoPlayer"
       autoplay
       playsinline
       preload="auto"></video>

<img id="imagePlayer">

<iframe id="youtubePlayer"
        allow="autoplay; fullscreen">
</iframe>

<script>

let items = [];
let i = 0;

const video =
  document.getElementById("videoPlayer");

const image =
  document.getElementById("imagePlayer");

const youtube =
  document.getElementById("youtubePlayer");

/* tempo imagem */

const IMAGE_TIME = 10;

/* tempo youtube (segundos) */

const YOUTUBE_TIME = 30;

/* carregar lista */

fetch("videos.json")
.then(r => r.json())
.then(data => {

  items = data.videos;

  playItem();

});

/* detectar tipos */

function isImage(file) {

  return file.match(/\.(jpg|jpeg|png|webp)$/i);

}

function isVideo(file) {

  return file.match(/\.(mp4|webm)$/i);

}

function isYoutube(file) {

  return file.startsWith("youtube:");

}

/* extrair ID youtube */

function getYoutubeID(url) {

  const reg =
    /(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/;

  const match = url.match(reg);

  return match ? match[1] : null;

}

/* reprodução */

function playItem() {

  if (!items.length) return;

  const file = items[i];

  /* limpar tela */

  video.style.display = "none";
  image.style.display = "none";
  youtube.style.display = "none";

  /* vídeo local */

  if (isVideo(file)) {

    video.style.display = "block";

    video.src = file;

    video.play().catch(()=>{});

  }

  /* imagem */

  else if (isImage(file)) {

    image.style.display = "block";

    image.src = file;

    setTimeout(
      nextItem,
      IMAGE_TIME * 1000
    );

  }

  /* youtube */

  else if (isYoutube(file)) {

    const url =
      file.replace("youtube:", "");

    const id =
      getYoutubeID(url);

    if (!id) {
      nextItem();
      return;
    }

    youtube.style.display = "block";

    youtube.src =
      "https://www.youtube.com/embed/" +
      id +
      "?autoplay=1&mute=1";

    setTimeout(
      nextItem,
      YOUTUBE_TIME * 1000
    );

  }

}

/* próximo */

function nextItem() {

  video.pause();

  youtube.src = "";

  i++;

  if (i >= items.length)
    i = 0;

  playItem();

}

/* fim vídeo local */

video.addEventListener(
  "ended",
  nextItem
);

</script>

</body>
</html>
