<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body {
  margin: 0;
  background: black;
  overflow: hidden;
}

video,
img,
iframe {

  position: absolute;

  width: 100vw;
  height: 100vh;

  object-fit: contain;

  border: none;

  opacity: 0;
  transition: opacity 0.4s ease;
}

.active {
  opacity: 1;
}

</style>

</head>

<body>

<video id="videoPlayer"
       autoplay
       playsinline
       preload="auto"></video>

<img id="imagePlayer">

<iframe id="youtubePlayer"
        allow="autoplay; fullscreen">
</iframe>

<script>

let items = [];
let i = 0;

const video =
  document.getElementById("videoPlayer");

const image =
  document.getElementById("imagePlayer");

const youtube =
  document.getElementById("youtubePlayer");

/* duração */

const IMAGE_TIME = 10;
const YOUTUBE_TIME = 30;

/* carregar lista */

Promise.all([
  fetch("videos.json").then(r => r.json()),
  fetch("extras.json").then(r => r.json())
])
.then(([videosData, extrasData]) => {

  items = [
    ...videosData.videos,
    ...extrasData.extras
  ];

  playItem();

});

/* detectar tipos */

function isImage(file) {
  return file.match(/\.(jpg|jpeg|png|webp)$/i);
}

function isVideo(file) {
  return file.match(/\.(mp4|webm)$/i);
}

function isYoutube(file) {
  return file.startsWith("youtube:");
}

/* extrair id */

function getYoutubeID(url) {

  const reg =
    /(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/;

  const match = url.match(reg);

  return match ? match[1] : null;

}

/* limpar tela */

function hideAll() {

  video.classList.remove("active");
  image.classList.remove("active");
  youtube.classList.remove("active");

}

/* reprodução */

function playItem() {

  if (!items.length) return;

  const file = items[i];

  if (isVideo(file)) {

    video.src = file;

    video.onloadeddata = () => {

      hideAll();

      video.classList.add("active");

      video.play().catch(()=>{});

    };

  }

  else if (isImage(file)) {

    image.src = file;

    image.onload = () => {

      hideAll();

      image.classList.add("active");

      setTimeout(
        nextItem,
        IMAGE_TIME * 1000
      );

    };

  }

  else if (isYoutube(file)) {

    const url =
      file.replace("youtube:", "");

    const id =
      getYoutubeID(url);

    if (!id) {
      nextItem();
      return;
    }

    youtube.src =
      "https://www.youtube.com/embed/" +
      id +
      "?autoplay=1&mute=1";

    setTimeout(() => {

      hideAll();

      youtube.classList.add("active");

      setTimeout(
        nextItem,
        YOUTUBE_TIME * 1000
      );

    }, 800);

  }

}

/* próximo */

function nextItem() {

  video.pause();

  youtube.src = "";

  i++;

  if (i >= items.length)
    i = 0;

  playItem();

}

/* vídeo terminou */

video.addEventListener(
  "ended",
  nextItem
);

</script>

</body>
</html>
